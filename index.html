<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralVision | Sneha Parmar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h3>NEURAL.AI</h3>
        <p style="color: #444; margin-top: 20px;">DASHBOARD</p>
        <p style="color: #444;">DATASET</p>
        <p style="color: #444;">TRAINING</p>
        <p style="color: #444;">MODELS</p>
    </div>

    <div class="main-content">
        <h1>Vision Intelligence Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Accuracy Rate</div>
                <div class="stat-val">98.4%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Inference Time</div>
                <div class="stat-val">12ms</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Model Health</div>
                <div class="stat-val" style="color: #00ff88;">OPTIMAL</div>
            </div>
        </div>

        <div class="vision-box">
            <div class="scan-line"></div>
            <div style="text-align: center;">
                <p style="color: #333;">[ FEED_01_INPUT ]</p>
                <h4 style="color: #555;">SCANNING OBJECTS...</h4>
            </div>
        </div>
    </div>
</body>
</html>
